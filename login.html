<!DOCTYPE html>
<html>
<head>
<title>BlockRock Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f1f3f6;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}


.login-box{

    background:white;
    width:350px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 20px #ccc;
}


h2{
    text-align:center;
}


input{

    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;

}


button{

    width:100%;
    padding:12px;
    background:#2874f0;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;

}


button:hover{

    background:#0d5bd7;

}


p{

text-align:center;

}


</style>

</head>


<body>


<div class="login-box">


<h2>BlockRock Login</h2>


<input 
id="name"
type="text"
placeholder="Enter Name">


<input 
id="email"
type="email"
placeholder="Enter Email">


<input 
id="password"
type="password"
placeholder="Enter Password">



<button onclick="login()">

Login

</button>


<p id="msg"></p>


</div>




<script>


function login(){


let name =
document.getElementById("name").value;


let email =
document.getElementById("email").value;


let password =
document.getElementById("password").value;



if(name=="" || email=="" || password==""){


document.getElementById("msg").innerHTML =
"Fill all details";


return;


}



let user = {


name:name,
email:email


};



localStorage.setItem(
"br_user",
JSON.stringify(user)

);



document.getElementById("msg").innerHTML =
"Login Successful";


setTimeout(()=>{


window.location.href="index.html";


},1000);



}


</script>


</body>
</html>
