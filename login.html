<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Gaming Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f172a, #020617);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Animated Background Glow */
body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: #00f7ff;
    filter: blur(150px);
    opacity: 0.2;
    animation: move 6s infinite alternate;
}

@keyframes move {
    0% { transform: translate(-100px, -100px); }
    100% { transform: translate(100px, 100px); }
}

/* Container */
.container {
    position: relative;
    width: 320px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0, 247, 255, 0.2);
    text-align: center;
    color: white;
    z-index: 1;
}

/* Neon Rotating Ring */
.container::before {
    content: "";
    position: absolute;
    inset: -3px;
    border-radius: 25px;
    background: conic-gradient(
        #00f7ff,
        #0ea5e9,
        #22c55e,
        #00f7ff
    );
    animation: spin 4s linear infinite;
    z-index: -2;
}

/* Inner Dark Layer */
.container::after {
    content: "";
    position: absolute;
    inset: 3px;
    background: rgba(2, 6, 23, 0.9);
    border-radius: 20px;
    z-index: -1;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Heading Glow */
h2 {
    margin-bottom: 20px;
    color: #00f7ff;
    text-shadow: 0 0 10px #00f7ff;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 30px;
    border: 1px solid rgba(0, 247, 255, 0.3);
    background: transparent;
    color: white;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #00f7ff;
    box-shadow: 0 0 10px #00f7ff;
}

/* Neon Button */
button {
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    border: none;
    background: #00f7ff;
    color: black;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 20px #00f7ff;
    transform: scale(1.05);
}

/* Links */
p {
    margin-top: 10px;
    font-size: 14px;
    color: #94a3b8;
}

p span {
    color: #00f7ff;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>LOGIN</h2>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Login</button>
    <p>Don't have account? <span>Sign Up</span></p>
</div>

</body>
</html>
