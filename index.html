<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">ShopEasy</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Shop</a>
            <a href="#">Electronics</a>
            <a href="#">Fashion</a>
            <a href="#">Contact</a>
        </nav>

        <div class="header-right">
            <button onclick="toggleDarkMode()">🌙 Dark Mode</button>
            <div class="cart">
                🛒 Cart: <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <h1>Big Summer Sale</h1>
        <p>Up to 50% OFF on Electronics, Fashion & Accessories</p>
        <button>Shop Now</button>
    </section>

    <!-- Search -->
    <section class="search-section">
        <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
            onkeyup="searchProducts()">
    </section>

    <!-- Filters -->
    <section class="filters">
        <button onclick="filterProducts('all')">All</button>
        <button onclick="filterProducts('Electronics')">Electronics</button>
        <button onclick="filterProducts('Fashion')">Fashion</button>
        <button onclick="filterProducts('Accessories')">Accessories</button>
    </section>

    <!-- Products -->
    <section class="products" id="product-container">
        <!-- Products generated by JavaScript -->
    </section>

    <!-- Cart Sidebar -->
    <aside class="cart-sidebar" id="cartSidebar">
        <h2>Shopping Cart</h2>
        <ul id="cartItems"></ul>
        <h3>Total: ₹<span id="totalPrice">0</span></h3>
    </aside>

    <!-- Notification -->
    <div id="notification" class="notification">
        Product Added Successfully!
    </div>

    <!-- Newsletter -->
    <section class="newsletter">
        <h2>Subscribe for Updates</h2>
        <input type="email" placeholder="Enter your email">
        <button>Subscribe</button>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 ShopEasy | Developed by Ashish</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
