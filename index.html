<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ShopEasy</h1>
        <div class="cart">
            🛒 Cart: <span id="cart-count">0</span>
        </div>
    </header>

    <section class="products">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" alt="Headphones">
            <h3>Wireless Headphones</h3>
            <p>₹1,999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=300" alt="Watch">
            <h3>Smart Watch</h3>
            <p>₹2,499</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1589003077984-894e133dabab?w=300" alt="Speaker">
            <h3>Bluetooth Speaker</h3>
            <p>₹1,499</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
